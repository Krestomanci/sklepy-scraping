  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - scraper-alkoholeswiata24
      - scraper-domwhisky
      - scraper-dobreflaszki
      - scraper-forfiterexclusive
      - scraper-winodlakazdego
      - scraper-darwina
    if: always()

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Pobierz wszystkie CSV-y
        uses: actions/download-artifact@v4
        with:
          pattern: csv-*
          merge-multiple: true
      - name: Wyślij wyniki mailem
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_email.py
