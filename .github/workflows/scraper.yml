name: Scraping nocny – sklepy alkoholowe

on:
  schedule:
    - cron: "0 2 * * 1,3,5"   # Pon, Śr, Pt o 3:00 czasu polskiego
  workflow_dispatch:

jobs:

  scraper-alkoholeswiata24:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scrapers/alkoholeswiata24.py
        continue-on-error: true
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csv-alkoholeswiata24
          path: "*.csv"
          retention-days: 1

  scraper-domwhisky:
