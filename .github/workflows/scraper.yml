name: Scraping nocny – sklepy alkoholowe

on:
  schedule:
    - cron: "0 2 * * 1-5"   # Pon–Pt o 3:00 czasu polskiego
  workflow_dispatch:

jobs:

  # ── Każdy scraper jako osobny niezależny job ──────────────────────

  scraper-alkoholeswiata24:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scrapers/alkoholeswiata24.py
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: csv-alkoholeswiata24
          path: "*.csv"
          retention-days: 1

  scraper-domwhisky:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # domwhisky ma dużo produktów – 4h
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scrapers/domwhisky.py
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: csv-domwhisky
          path: "*.csv"
          retention-days: 1

  scraper-dobreflaszki:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scrapers/dobreflaszki.py
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: csv-dobreflaszki
          path: "*.csv"
          retention-days: 1

  scraper-forfiterexclusive:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scrapers/forfiterexclusive.py
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: csv-forfiterexclusive
          path: "*.csv"
          retention-days: 1

  scraper-winodlakazdego:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scrapers/winodlakazdego.py
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: csv-winodlakazdego
          path: "*.csv"
          retention-days: 1

  # ── Job wysyłający mail – czeka aż wszystkie skończą ─────────────

  send-email:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - scraper-alkoholeswiata24
      - scraper-domwhisky
      - scraper-dobreflaszki
      - scraper-forfiterexclusive
      - scraper-winodlakazdego
    if: always()   # wyślij mail nawet jeśli któryś scraper padł

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Pobierz wszystkie CSV-y
        uses: actions/download-artifact@v4
        with:
          pattern: csv-*
          merge-multiple: true   # wszystkie do jednego folderu

      - name: Wyślij wyniki mailem
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python send_email.py
